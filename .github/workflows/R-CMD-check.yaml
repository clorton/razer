# Run R CMD check (which runs the full testthat suite via tests/testthat.R) on
# every pull request and on pushes to main. Adapted from
# r-lib/actions/examples/check-standard.yaml, with a Rust toolchain step because
# razer is an extendr (Rust-backed) package and must compile during install.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      # Actions are pinned to a full commit SHA (with the human-readable tag in a
      # trailing comment) rather than a mutable version tag — a moving tag could be
      # repointed to malicious code, so we pin the exact commit we reviewed.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust (needed to compile the extendr crate)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0

      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2.12.0
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
