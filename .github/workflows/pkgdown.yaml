# Build the pkgdown site and deploy it to GitHub Pages (gh-pages branch).
# Adapted from r-lib/actions/examples/pkgdown.yaml, with a Rust toolchain step
# added because razer is an extendr (Rust-backed) package and must compile during
# installation.
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # Actions are pinned to a full commit SHA (with the human-readable tag in a
      # trailing comment) rather than a mutable version tag — a moving tag could be
      # repointed to malicious code, so we pin the exact commit we reviewed.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0

      - name: Set up Rust (needed to compile the extendr crate)
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2

      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Drop internal pages from the published site
        # pkgdown renders every root-level .md (including the internal CLAUDE.md dev
        # note and the internal writeup.md assessment) and ignores .Rbuildignore for
        # these, so remove them before deploy.
        run: rm -f docs/CLAUDE.html docs/writeup.html
        shell: bash

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@65b5dfd4f5bcd3a7403bbc2959c144256167464e # v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
