url: https://clorton.github.io/razer/

template:
  bootstrap: 5

reference:
- title: Model runner
  desc: >
    One call to build, seed, and run a closed-population agent-based model
    (SI / SEI / SIS / SEIS / SIR / SEIR / SIRS / SEIRS) on the Column kernels.
  contents:
  - run_model
- title: Agent & node storage
  desc: >
    Rust-owned, dtype-tagged property arrays (per-agent and per-node/per-tick), the
    incremental-census carry-forward helpers, and the epidemic state codes.
  contents:
  - Column
  - allocate_scalar
  - allocate_vector
  - carry_forward
  - carry_forward_states
  - laser_states
- title: Distributions
  desc: >
    Parameterized probability distributions used to draw state-timer durations
    (e.g. incubation and infectious periods).
  contents:
  - Distribution
  - starts_with("dist_")
- title: Transmission & disease dynamics
  desc: >
    Per-tick Column kernels for force of infection and the timed state
    transitions of the SI/SEI/SIS/SEIS/SIR/SEIR/SIRS/SEIRS menagerie. The kernels
    return per-node counts the model applies to its census via `move_count`; place
    `calc_foi` so the effective reproduction number is the full `beta * D` (see the
    modeling note in the package README / CLAUDE.md).
  contents:
  - calc_foi
  - transmission
  - transmission_si
  - step_si
  - step_sir
  - step_sirs
  - step_timer_expire
  - step_timer_expire_set
  - move_count
- title: Vital dynamics & importation
  desc: >
    Births, deaths, and externally-seeded cases.
  contents:
  - births
  - mortality
  - constant_pop_vitals_sir
  - import_infections
- title: Demographics & initialization
  desc: >
    Realistic age structure and dates of death, and capacity sizing.
  contents:
  - AliasedDistribution
  - aliased_distribution
  - KaplanMeierEstimator
  - kaplan_meier_estimator
  - load_pyramid_csv
  - sample_pyramid_ages
  - calc_capacity
  - calc_capacity_cdr
- title: Spatial coupling & migration
  desc: >
    Pairwise distances and migration-network models for spatial coupling of the
    force of infection.
  contents:
  - distances
  - gravity
  - radiation
  - stouffer
  - competing_destinations
  - row_normalizer
- title: Reproducibility
  desc: >
    Seed the simulation RNG. After `set_seed()`, a run is reproducible regardless of
    CPU/thread count; `unset_seed()` reverts to entropy-seeded (random) runs.
  contents:
  - set_seed
  - unset_seed
- title: Utilities
  desc: >
    Grid broadcasting and binning helpers.
  contents:
  - values_map
  - bincount
  - bincount_wt
  - bincount_where
  - bincount_where_wt
  - squash

# Teaching articles (vignettes/articles/*.Rmd — website-only, .Rbuildignore'd).
# Each pairs 1:1 with a runnable script in examples/.
articles:
- title: Foundations
  desc: >
    Start here: the run_model() workflow, epidemic final size, and the endemic
    equilibrium.
  contents:
  - articles/getting_started
  - articles/attack_fraction
  - articles/endemic_dynamics
- title: Building richer models
  desc: >
    Adding spatial structure and realistic demography to a model.
  contents:
  - articles/spatial_metapopulation
  - articles/demographics
  - articles/vital_dynamics_measles
- title: Interventions & scale
  desc: >
    Custom states and callbacks for interventions, and bounded memory for
    century-long open-population runs.
  contents:
  - articles/interventions
  - articles/long_runs_and_memory
- title: Customizing & extending
  desc: >
    The reference for going beyond run_model(): R callbacks and the kernel toolbox, the
    R-vs-Rust boundary, setting up Rust, and an LLM-prompting recipe for new kernels.
  contents:
  - articles/extending_razer
